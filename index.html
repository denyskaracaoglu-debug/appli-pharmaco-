<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Pharmacologie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2e2e3e;--accent:#7c6af7;--accent2:#a78bfa;--green:#34d399;--red:#f87171;--amber:#fbbf24;--text:#f0f0f5;--muted:#8888aa;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:"";position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(124,106,247,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:2rem 1.25rem 4rem;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem;}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.app-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:700;}
.app-sub{font-size:13px;color:var(--muted);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.screen{display:none;}
.screen.active{display:block;}
.section-label{font-family:"Syne",sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;}
.mode-btn{display:flex;align-items:center;gap:14px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;cursor:pointer;transition:all 0.2s;margin-bottom:10px;text-align:left;color:var(--text);font-family:"DM Sans",sans-serif;}
.mode-btn:hover{border-color:var(--accent);background:rgba(124,106,247,0.08);}
.mode-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.m-title{font-size:15px;font-weight:500;}
.m-desc{font-size:12px;color:var(--muted);margin-top:2px;}
.progress-track{background:var(--surface2);border-radius:99px;height:4px;margin-bottom:1.5rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.4s ease;}
.q-counter{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.q-num{font-size:13px;color:var(--muted);}
.btn-back{background:none;border:none;color:var(--muted);font-size:13px;font-family:"DM Sans",sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;}
.btn-back:hover{color:var(--text);}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;letter-spacing:0.02em;}
.badge-chapter{background:rgba(124,106,247,0.2);color:var(--accent2);border:1px solid rgba(124,106,247,0.3);}
.badge-qcm{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3);}
.badge-open{background:rgba(251,191,36,0.15);color:var(--amber);border:1px solid rgba(251,191,36,0.3);}
.badge-case{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3);}
.badge-ordonnance{background:rgba(14,165,233,0.15);color:#38bdf8;border:1px solid rgba(14,165,233,0.3);}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.q-scenario{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:0.9rem 1rem;font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:1rem;}
.q-text{font-family:"Syne",sans-serif;font-size:17px;font-weight:600;line-height:1.5;margin-bottom:1.25rem;}

/* Ordonnance */
.ordonnance{background:#12121a;border:1px dashed #3a3a50;border-radius:10px;padding:1.1rem 1.2rem;margin-bottom:1.25rem;font-size:13px;line-height:1.9;}
.ordonnance-header{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem;font-family:"Syne",sans-serif;}
.ordonnance-patient{font-size:12px;color:var(--muted);margin-bottom:0.6rem;padding-bottom:0.6rem;border-bottom:1px solid var(--border);}
.ordonnance-med{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(46,46,62,0.5);}
.ordonnance-med:last-child{border-bottom:none;}
.med-num{color:var(--accent2);font-weight:600;font-size:12px;min-width:16px;}
.med-info{flex:1;}
.med-name{font-weight:500;color:var(--text);}
.med-dose{color:var(--muted);font-size:12px;}
.decision-btns{display:flex;gap:10px;margin-top:0.75rem;}
.btn-deliver{flex:1;padding:0.85rem;background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.4);border-radius:10px;font-size:15px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all 0.15s;}
.btn-deliver:hover:not(:disabled){background:rgba(52,211,153,0.22);}
.btn-refuse{flex:1;padding:0.85rem;background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.4);border-radius:10px;font-size:15px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all 0.15s;}
.btn-refuse:hover:not(:disabled){background:rgba(248,113,113,0.22);}
.btn-deliver:disabled,.btn-refuse:disabled{opacity:0.4;cursor:default;}

.option-btn{display:block;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;margin-bottom:8px;cursor:pointer;font-size:14px;color:var(--text);font-family:"DM Sans",sans-serif;transition:all 0.15s;line-height:1.5;}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);}
.option-btn.correct{border-color:var(--green);background:rgba(52,211,153,0.1);color:var(--green);}
.option-btn.wrong{border-color:var(--red);background:rgba(248,113,113,0.1);color:var(--red);}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;font-size:14px;color:var(--text);font-family:"DM Sans",sans-serif;resize:vertical;min-height:110px;line-height:1.6;}
textarea:focus{outline:none;border-color:var(--accent);}
.feedback{border-radius:10px;padding:1rem 1.1rem;margin-top:1rem;font-size:14px;line-height:1.7;display:none;}
.feedback.show{display:block;}
.feedback.good{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#86efac;}
.feedback.partial{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);color:#fde68a;}
.feedback.bad{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#fca5a5;}
.btn-primary{width:100%;padding:0.85rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer;transition:opacity 0.15s;margin-top:0.75rem;}
.btn-primary:hover{opacity:0.9;}
.btn-ghost{width:100%;padding:0.85rem;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all 0.15s;margin-top:8px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--text);}
.score-ring{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,rgba(124,106,247,0.3),rgba(167,139,250,0.2));border:2px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.score-num{font-family:"Syne",sans-serif;font-size:26px;font-weight:800;color:var(--accent2);}
.score-lbl{font-size:11px;color:var(--muted);margin-top:-2px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;}
.stat-row:last-child{border-bottom:none;}
.loading{display:none;align-items:center;gap:10px;padding:0.75rem 0;color:var(--muted);font-size:14px;}
.loading.show{display:flex;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.theme-row{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.9rem 1rem;margin-bottom:8px;cursor:pointer;transition:all 0.2s;}
.theme-row:hover{border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(3px);}
.theme-row-icon{font-size:18px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(124,106,247,0.12);border-radius:8px;flex-shrink:0;}
.theme-row-name{font-size:14px;font-weight:500;flex:1;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">💊</div>
    <div><div class="app-title">Quiz Pharmacologie</div><div class="app-sub">Révision intelligente par IA</div></div>
  </div>

  <!-- ÉCRAN 1 : Accueil -->
  <div id="screen-home" class="screen active">
    <div class="card">
      <p class="section-label">Choisir un chapitre</p>
      <button class="mode-btn" onclick="openChapter('ch3')">
        <div class="mode-icon" style="background:rgba(248,113,113,0.15);">🩸</div>
        <div><div class="m-title">Chapitre 3</div><div class="m-desc">Sang & coagulation</div></div>
      </button>
      <button class="mode-btn" onclick="openChapter('ch2')">
        <div class="mode-icon" style="background:rgba(52,211,153,0.15);">❤️</div>
        <div><div class="m-title">Chapitre 2</div><div class="m-desc">Le système cardiovasculaire</div></div>
      </button>
      <button class="mode-btn" onclick="openChapter('ch6')">
        <div class="mode-icon" style="background:rgba(251,191,36,0.15);">⚗️</div>
        <div><div class="m-title">Chapitre 6</div><div class="m-desc">Le système hormonal</div></div>
      </button>
      <button class="mode-btn" onclick="openChapter('ch9')">
        <div class="mode-icon" style="background:rgba(251,191,36,0.15);">💊</div>
        <div><div class="m-title">Chapitre 9</div><div class="m-desc">Douleur, fièvre & analgésiques</div></div>
      </button>
      <button class="mode-btn" onclick="openChapter('ch11')">
        <div class="mode-icon" style="background:rgba(124,106,247,0.15);">🧠</div>
        <div><div class="m-title">Chapitre 11</div><div class="m-desc">Le système nerveux</div></div>
      </button>
    </div>
    <div class="card">
      <p class="section-label">Ou réviser tout</p>
      <button class="mode-btn" onclick="startQuiz(ALL_CHAPTERS)">
        <div class="mode-icon" style="background:rgba(52,211,153,0.15);">🎯</div>
        <div><div class="m-title">Mode examen global</div><div class="m-desc">Tous les chapitres mélangés</div></div>
      </button>
    </div>
  </div>

  <!-- ÉCRAN 2 : Sous-thèmes -->
  <div id="screen-themes" class="screen">
    <button class="btn-back" onclick="showScreen('home')" style="margin-bottom:1rem;">← Retour</button>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;">
        <div id="th-chapter-icon" style="font-size:26px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:rgba(124,106,247,0.12);border-radius:12px;flex-shrink:0;"></div>
        <div>
          <div id="th-chapter-title" style="font-family:Syne,sans-serif;font-size:16px;font-weight:700;"></div>
          <div id="th-chapter-sub" style="font-size:12px;color:var(--muted);margin-top:2px;"></div>
        </div>
      </div>
      <p class="section-label">Mode</p>
      <button class="mode-btn" onclick="examAllThemes()">
        <div class="mode-icon" style="background:rgba(251,191,36,0.15);">🎯</div>
        <div><div class="m-title">Mode examen</div><div class="m-desc">Tous les sous-thèmes mélangés</div></div>
      </button>
    </div>
    <div class="card">
      <p class="section-label">Ou choisir un sous-thème</p>
      <div id="theme-list"></div>
    </div>
  </div>

  <!-- ÉCRAN QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="q-counter">
      <button class="btn-back" onclick="showScreen('home')">✕ Quitter</button>
      <span class="q-num" id="q-num-label">Question 1</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:5%"></div></div>
    <div class="card" id="q-card">
      <div class="q-meta">
        <span class="badge badge-chapter" id="q-chap-badge"></span>
        <span class="badge" id="q-type-badge"></span>
      </div>
      <div id="q-scenario" class="q-scenario" style="display:none;"></div>
      <div class="q-text" id="q-text"></div>
      <div id="q-ordonnance" style="display:none;"></div>
      <div id="q-options"></div>
      <textarea id="q-textarea" placeholder="Écris ta réponse ici..." style="display:none;"></textarea>
      <div class="feedback" id="q-feedback"></div>
    </div>
    <div class="loading" id="q-loading"><div class="spinner"></div><span id="q-loading-text">Génération...</span></div>
    <div id="q-actions"></div>
  </div>

  <!-- ÉCRAN RÉSULTATS -->
  <div id="screen-results" class="screen">
    <div class="card" style="text-align:center;padding:2rem 1.5rem;">
      <div class="score-ring"><span class="score-num" id="res-pct">0%</span><span class="score-lbl">Score</span></div>
      <p style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;" id="res-title"></p>
      <p style="font-size:14px;color:var(--muted);" id="res-sub"></p>
    </div>
    <div class="card" id="res-stats"></div>
    <button class="btn-primary" onclick="retryQuiz()">🔄 Nouveau quiz</button>
    <button class="btn-ghost" onclick="showScreen('home')">Changer de chapitre</button>
  </div>
</div>

<script>
const BOOK = {
  ch3: {
    title:"Chapitre 3", subtitle:"Sang & coagulation", icon:"🩸",
    themes:[
      {name:"Antiagrégants plaquettaires", icon:"🔴", hasPrescription:true, content:"Hémostase: vasoconstriction + adhésion plaquettaire + formation fibrine. Antiagrégants: inhibiteurs COX-1 (aspirine), antagonistes P2Y12 (clopidogrel/prasugrel/ticagrelor/ticlopidine), inhibiteur recapture adénosine (dipyridamole), antagonistes GPIIb/IIIa (eptifibatide/tirofiban/abciximab), analogue PGI2 (époprosténol). Aspirine: acétylation irréversible COX-1, inhibe TXA2, durée 7-10j (vie plaquette). Usages aspirine: SCA, AVC ischémique, prévention secondaire CV. Pas de place en prévention primaire. Posologie aspirine: SCA 300mg puis 75-100mg/j; AVC 160-300mg puis 75-100mg/j. IM aspirine: risque hémorragie avec anticoagulants/AINS/ISRS/IRSN. CI aspirine: hémorragie active, ulcère gastro-duodénal, enfants <12 ans infection virale, insuffisance rénale/hépatique sévère. Clopidogrel/prasugrel: inhibition irréversible P2Y12, prodrogues métabolisées CYP2C19. Ticagrelor: inhibition réversible P2Y12. Clopidogrel: substrat CYP2C19+CYP3A4, inhibiteur CYP2B6+CYP2C8. Ticagrelor: substrat+inhibiteur CYP3A4+P-gp. CI prasugrel: ATCD AVC/AIT. CI ticagrelor: hémorragie intracrânienne, insuffisance hépatique sévère. EI thienopyridines: hémorragies, ticlopidine: toxicité hématologique. Dipyridamole: inhibe phosphodiestérase type 3 + recapture adénosine + synthèse TXA2. Posologie: 300-450mg/j avec AVK pour prothèses valvulaires. GPIIb/IIIa: IV uniquement (milieu hospitalier). Epoprosténol: hémodialyse, hypertension pulmonaire."},
      {name:"Anticoagulants injectables", icon:"💉", hasPrescription:true, content:"Héparines: glycosaminoglycans. Non fractionnées (HNF): inhibent FIIa+FXa via antithrombine, effet rapidement réversible, 3x/j SC. Fractionnées HBPM (daltéparine, énoxaparine, nadroparine, tinzaparine): forte action anti-FXa, longue demi-vie, 1x/j SC, pas de monitoring habituel sauf insuffisance rénale. Fondaparinux: pentasaccharide synthétique, inhibe uniquement FXa. Bivalirudine: inhibiteur direct thrombine. IM héparines: risque hémorragie avec antithrombotiques/AINS/ISRS/IRSN; risque spasmes vasculaires avec dérivés ergot. EI héparines: hémorragie, thrombopénie induite héparine (TIH), hyperkaliémie, augmentation enzymes hépatiques. CI héparines: hémorragie active, TIH, endocardite bactérienne aiguë. HNF CI aussi: insuffisance rénale/hépatique sévère. Antidote héparines: protamine (10mg neutralise 1000UI héparine), neutralisation incomplète pour HBPM."},
      {name:"Anticoagulants oraux – AVK", icon:"💊", hasPrescription:true, content:"AVK (antagonistes vitamine K): inhibition compétitive VKORC1. Inhibent synthèse facteurs II, VII, IX, X + protéine C et S. Délai action = temps dégradation facteurs existants (VII 6h < IX < X < II 60h). Marge thérapeutique étroite, ajustement selon INR. Acénocoumarol: demi-vie 8h, anticoagulation 48h. Warfarine: demi-vie 20-60h, anticoagulation 2-5 jours. Phénprocoumone: demi-vie 140-160h, anticoagulation 1-2 semaines. IM AVK: augmentation effet: inhibiteurs CYP2C9 (cimétidine, amiodarone, antifongiques azolés), AINS déplacent liaison albumine, antibiotiques à large spectre (diminuent vit K), AINS/ISRS/IRSN (risque hémorragique). Diminution effet: inducteurs CYP2C9 (carbamazépine, phénytoïne, rifampicine), cholestyramine, suppléments vit K. CI AVK: hémorragie active, grossesse, insuffisance rénale/hépatique sévère. EI: hémorragie, augmentation transitoire enzymes hépatiques."},
      {name:"Anticoagulants oraux – AOD", icon:"🔵", hasPrescription:true, content:"AOD (anticoagulants oraux directs): marge thérapeutique moins étroite que AVK. Dabigatran (étéxilate=prodrogue): inhibiteur direct thrombine réversible compétitif. Substrat P-gp. Posologie: prévention TVP 220mg/j 1 prise; FA non valvulaire 300mg/j 2 prises; TVP/EP traitement 300mg/j 2 prises. Apixaban: inhibiteur FXa direct. Substrat CYP3A4+P-gp. Posologie: FA 20mg/j 1 prise; TVP/EP traitement 30mg/j 2 prises 21j puis 20mg/j; prévention TVP 10mg/j. Edoxaban: inhibiteur FXa. Substrat P-gp. 60mg/j 1 prise. Rivaroxaban: inhibiteur FXa. Substrat CYP3A4+P-gp. CI tous AOD: hémorragie active, prothèses valvulaires, atteinte hépatique avec coagulopathie. Dabigatran CI aussi: insuffisance rénale sévère. EI AOD: hémorragie (risque augmente si insuffisance rénale), troubles GI, augmentation enzymes hépatiques. Dabigatran: suspicion risque accru IDM."},
      {name:"Thrombolytiques & antihémorragiques", icon:"⚡", hasPrescription:false, content:"Thrombolytiques: activateurs du plasminogène. Altéplase (tPA recombinant): IDM aigu, embolie pulmonaire, AVC ischémique. Ténectéplase: IDM aigu. Urokinase: embolie pulmonaire, thrombose artérielle/veineuse. Tous IV, usage hospitalier. IM thrombolytiques: risque hémorragie avec antithrombotiques/AINS/ISRS. CI thrombolytiques: hémorragie active, endocardite bactérienne, péricardite, pancréatite aiguë, insuffisance hépatique sévère. Altéplase AVC CI aussi: convulsions, hyper/hypoglycémie, ATCD AVC sévère. EI: hémorragie, hypersensibilité rare. Antihémorragiques: acide tranexamique (antifibrinolytique): prostatectomie, amygdalectomie, extraction dentaire, ménorragies. Aprotinine: antifibrinolytique. Protamine: antidote héparines, 10mg neutralise 1000UI. EI protamine: hypotension, bradycardie."}
    ]
  },
  ch9: {
    title:"Chapitre 9", subtitle:"Douleur, fièvre & analgésiques", icon:"💊",
    themes:[
      {name:"Physiopathologie douleur & fièvre", icon:"🧠", hasPrescription:false, content:"Thermorégulation: thermorécepteurs centraux et périphériques, centre thermorégulateur hypothalamique (noyau préoptique). Baisse T°: sudation + vasodilatation. Hausse T°: frissons + vasoconstriction + adipocytes bruns. Intermédiaires: prostaglandines, interleukines. Douleur: expérience subjective avec composante affective. Nociception différente de douleur. EVA = échelle visuelle analogique. PAG (zone grise périaqueductale): voies descendantes inhibitrices. Fibres C: douleur sourde diffuse brûlante. Fibres Adelta: douleur aiguë localisée. Douleur chronique: hyperalgésie, allodynie. Douleur neuropathique: AVC, SEP, neuropathie diabétique, zona. Récepteurs µ opioïdes: CI, amygdale, hypothalamus, PAG, corne dorsale. Médiateurs: BK, 5-HT, PGs, NGF, substance P, CGRP, GABA, NA."},
      {name:"Paracétamol", icon:"💊", hasPrescription:true, content:"Paracétamol: analgésique-antipyrétique non narcotique. Inhibe synthèse PG dans SNC. Faible anti-inflammatoire, pas d'effets gastriques/plaquettaires. Inhibiteur faible COX-2. AM404 active endocannabinoïdes/TRPV1. Demi-vie 2-4h, métabolisme hépatique. Toxicité >10g adulte, >150mg/kg enfant. NAPQI (CYP2E1) si glutathion épuisé → mort cellulaire. Antidote: acétylcystéine IV ou méthionine orale. Posologie adulte >= 50kg: max 4g/j (500mg-1g x4). Avec facteurs risque: max 3g/j. IM: alcool/barbituriques/phénytoïne/carbamazépine/isoniazide augmentent risque hépatique. Flucloxacilline: risque AMTAE. CI: insuffisance rénale/hépatique sévère."},
      {name:"AAS & autres analgésiques", icon:"🔬", hasPrescription:false, content:"Aspirine analgésique: place limitée. Risque syndrome Reye enfants <12 ans infection virale. CI grossesse. CI: hémorragie active, ulcère gastro-duodénal, enfants <12 ans infection virale. Métamizole: antipyrétique et spasmolytique. Agranulocytose = EI grave. En Belgique: Novalgine. Syndromes Lyell et Stevens-Johnson. CI: hypotension, affections hématologiques. Néfopam: mécanisme inconnu, uniquement analgésique. CI: enfants, convulsions, IMAO, insuffisance rénale."},
      {name:"Approche médicamenteuse", icon:"🏥", hasPrescription:false, content:"Fièvre: traiter cause, pas toujours nécessaire. Paracétamol = 1er choix. Ibuprofène déconseillé si déshydratation/varicelle/zona. Douleur aiguë: étape 1 paracétamol, étape 2 AINS courte durée, étape 3 opioïde faible (codéine/tramadol). Douleur chronique: approche pluridisciplinaire. Douleur neuropathique: antidépresseurs (duloxétine), antiépileptiques (carbamazépine, gabapentine, prégabaline). Echelle OMS soins palliatifs: Palier I non opioïde, Palier II opioïde faible, Palier III opioïde fort oral/transdermique, Palier IV parentéral."},
      {name:"Les opioïdes", icon:"⚗️", hasPrescription:true, content:"Morphine = composé référence. Récepteurs: µ (MOPr) euphorie+++/dépression respiratoire+++/dépendance+++, κ (KOPr) dysphorie/hallucinations+++, δ (DOPr) analgésie spinale++. Faibles: codéine, tramadol. Puissants: morphine, fentanyl, oxycodone, méthadone, buprénorphine (agoniste partiel). Tolérance = doses croissantes. Dépendance physique + psychique. Constipation: pas de tolérance. Effets: analgésie, euphorie, dépression respiratoire, myosis, constipation, nausées. IM: syndrome sérotoninergique avec ISRS/IMAO (tramadol, fentanyl). Méthadone: allongement QT. Codéine/tramadol: substrats CYP2D6. CI: dépression respiratoire aiguë, asthme aiguë, BPCO sévère."},
      {name:"Antagonistes des opioïdes", icon:"🛡️", hasPrescription:false, content:"Naloxone: antagoniste central+périphérique, intoxications aiguës opioïdes. Naltrexone: dépendance opioïdes après désintoxication, aussi alcoolisme. Nalméfène: alcoolisme. Méthylnaltrexone: antagoniste périphérique uniquement, constipation liée aux opioïdes sans modifier analgésie centrale. CI méthylnaltrexone: obstruction GI. EI: douleurs abdominales, diarrhée, nausées, rarement perforation GI."}
    ]
  },
  ch11: {
    title:"Chapitre 11", subtitle:"Le système nerveux", icon:"🧠",
    themes:[
      {name:"Hypnotiques & anxiolytiques", icon:"😴", hasPrescription:true, content:"Benzodiazépines: récepteurs GABA-A, facilitent canaux chlorure. 5 effets: anxiolyse, sédation, relaxant musculaire, anticonvulsivant, amnésie antérograde. Tolérance+dépendance après 1-2 semaines. Arrêt progressif -10-20%/semaine. Courte durée (T1/2 <10h): triazolam, midazolam, zolpidem, zopiclone. Intermédiaire: alprazolam, bromazépam, lorazépam, oxazépam. Longue durée: diazépam, clonazépam, clorazépate, flurazépam. Doses équivalentes 10mg diazépam: alprazolam 0,5-1mg, lorazépam 1-2mg, triazolam 0,125-0,5mg. Substrats CYP3A4: alprazolam, flurazépam, midazolam, triazolam. CI: myasthénie, insuffisance respiratoire sévère, apnée obstructive. EI: somnolence, confusion PA, réactions paradoxales, tolérance, dépendance. Z-drugs: zopiclone/zolpidem, parasomnies. Mélatonine: CYP1A2, 2mg insomnie."},
      {name:"Antipsychotiques", icon:"🧪", hasPrescription:true, content:"Schizophrénie: 1% population. Symptômes positifs (hallucinations, délires) → hyperactivité mésolimbique. Symptômes négatifs (anhédonie) → hypoactivité mésocorticale. Antagonisme D2 (~80% récepteurs). Typiques: phénothiazines (lévomépromazine), butyrophénones (halopéridol), benzamides (amisulpride, sulpiride). Atypiques: antagonisme 5HT2A+D2. Aripiprazole: agoniste partiel D2. Quétiapine: 25mg hypnotique, 300mg antidépresseur, 800mg antipsychotique (substrat CYP2D6→norquétiapine). Clozapine: agranulocytose, myocardite, uniquement si échec autres. IM: torsades de pointes (dropéridol, pimozide, sertindole, sulpiride, halopéridol doses élevées). CI: troubles conscience, QT allongé. EI: symptômes extrapyramidaux (dystonie, parkinsonisme, dyskinésies tardives), hyperprolactinémie. Syndrome malin: hyperthermie >40°C, rigidité → arrêt + dopamine."},
      {name:"Antidépresseurs", icon:"💙", hasPrescription:true, content:"Hypothèse monoamine: déficit NA/5-HT. ISRS: fluoxétine, fluvoxamine, paroxétine, citalopram, escitalopram, sertraline. IM ISRS: hémorragie avec antithrombotiques/AINS, hyponatrémie avec diurétiques, syndrome sérotoninergique. Fluoxétine: inhibiteur CYP2D6/2C9/2C19/3A4. Fluvoxamine: inhibiteur CYP1A2/2C9/2C19/2D6/3A4. Syndrome sérotoninergique: agitation, myoclonies, hyperthermie, rigidité musculaire. ATC: imipramine, amitriptyline, clomipramine. CI: IMAO, IDM récent, arythmies, bloc AV. IRSN: venlafaxine (CYP2D6), duloxétine (CYP1A2+2D6). Mirtazapine: α2+5HT+H1, sédation, prise poids. Lithium (bipolaire): lithémie cible 0,6-0,8 mmol/l. CI lithium: déshydratation, hypothyroïdie non traitée, insuffisance rénale sévère."},
      {name:"TDAH & narcolepsie", icon:"⚡", hasPrescription:true, content:"TDAH: méthylphénidate (sympathicomimétique indirect), atomoxétine (ISRNA, substrat CYP2D6), guanfacine (agoniste α2). Méthylphénidate enfants ≥6 ans: 5-60mg/j. IM: IMAO → poussées HTA. CI méthylphénidate: HTA modérée-sévère, psychose, troubles bipolaires, hyperthyroïdie. Narcolepsie: modafinil (substrat CYP3A4, CI grossesse), pitolisant (substrat/inducteur CYP3A4, substrat/inhibiteur CYP2D6). Guanfacine: QT allongement, sédation, bradycardie."},
      {name:"Médicaments de la dépendance", icon:"🔗", hasPrescription:false, content:"Sevrage éthylique: BZD (diazépam/lorazépam) + thiamine B1. Prévention rechutes alcool: acamprosate, naltrexone, nalméfène, disulfirame. Tabagisme: substitution nicotinique, varénicline (agoniste partiel nicotinique), bupropione (substrat CYP2B6, inhibiteur CYP2D6). CI bupropione: tumeur SNC, sevrage BZD/alcool, troubles bipolaires, schizophrénie, IMAO. Opiacés: méthadone (CYP2B6, QT) + buprénorphine (CYP3A4, agoniste partiel). Association buprénorphine+naloxone: anti-abus IV."},
      {name:"Antiparkinsoniens", icon:"🫀", hasPrescription:true, content:"Parkinson: dégénérescence dopaminergique. Symptômes: hypokinésie, tremblement repos, rigidité. Phases ON/OFF. Lévodopa+bensérazide: plus efficace, complications long terme (dyskinésies, wearing-off). IM: repas protéinés diminuent absorption; antagonistes dopaminergiques diminuent effet. CI: IDM récent, arythmies, psychose, glaucome angle fermé. Agonistes dopaminergiques: pramipexole, ropinirole, rotigotine. EI: hallucinations, somnolence, comportement compulsif. COMT: entacapone 200mg avec chaque dose lévodopa. MAO-B: rasagiline (1mg matin), safinamide (100mg matin), sélégiline."},
      {name:"Antiépileptiques", icon:"⚡", hasPrescription:true, content:"Mécanismes: renforcement GABA, inhibition canaux Na+, canaux Ca2+. Valproate: 1er choix épilepsie généralisée, CI absolue grossesse. Lamotrigine: rash fréquent (risque si augmentation trop rapide). IM: contraceptifs oraux diminuent lamotrigine; valproate augmente lamotrigine. Carbamazépine: 1er choix crises focales. Inducteur puissant CYP1A2/2B6/2C9/3A4. EI: Stevens-Johnson, hyponatrémie. Gabapentine/prégabaline: douleurs neuropathiques, renforcent opioïdes. Phénytoïne: hyperplasie gingivale, allergie croisée carbamazépine. Lévétiracétam: pas d'interactions PK. Topiramate: ralentissement cognitif, CI grossesse."},
      {name:"Antimigraineux", icon:"🤕", hasPrescription:false, content:"Migraine: 10-15% population, rôle 5-HT. Traitement aigu: paracétamol/AAS → AINS → triptans. Triptans (antagonistes 5-HT): almotriptan, eletriptan, sumatriptan, zolmitriptan. CI triptans: coronaropathie, HTA non contrôlée, migraine hémiplégique. EI: oppression thoracique, céphalées médicamenteuses. Prophylaxie (≥2 crises/mois): β-bloquants 1er choix; valproate/topiramate/amitriptyline/flunarizine en alternatives. Flunarizine: antagoniste calcique, EI dépression, symptômes EP."},
      {name:"Maladie d'Alzheimer", icon:"🧠", hasPrescription:true, content:"Alzheimer: plaques amyloïdes + dégénérescences neurofibrillaires. MMSE: <24 atteint (20-24 léger, 10-19 modéré, <10 sévère). Inhibiteurs cholinestérase: donépézil (5-10mg/j, substrat CYP3A4+CYP2D6), galantamine (8-24mg/j), rivastigmine (3-12mg/j ou patch). Efficacité 1-2 ans. IM: antagonisme anticholinergiques; bradycardie avec β-bloquants/vérapamil. EI: nausées, diarrhée, bradycardie, incontinence urinaire. Mémantine: antagoniste NMDA, formes modérées-sévères."}
    ]
  }

  ch2: {
    title: "Chapitre 2",
    subtitle: "Le système cardiovasculaire",
    icon: "❤️",
    themes: [
      {name:"Alpha-bloquants & antihypertenseurs centraux", icon:"💊", content:"Térazosine: α1-bloquant, HTA, 1-2mg/j. CI: ATCD hypotension orthostatique. IM: hypotension sévère avec inhibiteurs PDE5. EI: hypotension orthostatique, tachycardie réflexe. Clonidine/moxonidine: agonistes α2 présynaptiques. Méthyldopa: inhibiteur dopa-décarboxylase (effet clonidine-like). Posologies: clonidine 0,15-0,60mg/j 2-3p; moxonidine 0,2-0,6mg/j; méthyldopa 750-3000mg/j. IM: sédation avec alcool/sédatifs; ATC diminuent effet; clonidine inhibiteur CYP2D6; AINS diminuent effet antihypertenseur. CI: clonidine/moxonidine: troubles conduction bradycardie; moxonidine: IC sévère; méthyldopa: dépression, hépatopathie aiguë. EI: hypotension orthostatique, sédation, sécheresse buccale, hypertension rebond à arrêt brutal (clonidine)."},
      {name:"Dérivés nitrés & molsidomine", icon:"💉", content:"Nitroglycérine + dinitrate isosorbide: donneurs NO, vasodilatation veineuse (précharge) + coronaires. Tolérance par épuisement thiols. Voies: sublinguale crise angor (dinitrate 2,5-5mg), orale traitement fond, transdermique (nitroglycérine patch 12-16h max 20mg/24h). IM: hypotension avec inhibiteurs PDE5 (sildénafil) CI ABSOLUE. CI: hypotension, choc, cardiomyopathie obstructive, sténose aortique/mitrale, HTIC. EI: céphalées, hypotension orthostatique (prendre assis). Molsidomine: libère NO sans thiol, pas de tolérance. LP: 16mg/j; classique: 6-12mg/j en 3p. Mêmes CI/EI."},
      {name:"Digoxine & glycosides cardiotoniques", icon:"🫀", content:"Digoxine: inhibe Na+/K+ ATPase, contractilité. Indications: FA (ralentissement ventriculaire), IC grave résistante. Marge étroite: cible 0,5-0,9ng/ml. Dose entretien 0,25mg/j (adapter IR, PA). IM: hypokaliémie potentialise toxicité; adsorbants diminuent absorption (intervalle plusieurs heures); substrat P-gp (amiodarone/ciclosporine/clarithromycine/itraconazole/vérapamil augmentent; rifampicine/millepertuis diminuent). CI: BAV 2e-3e degré, cardiomyopathie obstructive, tachycardie ventriculaire, IR sévère. EI: nausées, diarrhée, arythmies (risque si hypokaliémie), troubles visuels, vertiges."},
      {name:"Diurétiques de l'anse & thiazidiques", icon:"💧", content:"Anse (furosémide/bumétanide/torasémide): les plus puissants, inhibent Na+/K+/2Cl- anse Henlé. Posologies: furosémide 20-60mg/j; torasémide HTA 2,5mg/j, oedème 10mg/j. Thiazidiques (chlorthalidone/indapamide): hypertension non compliquée, inhibent cotransport Na+/Cl- distal. Chlorthalidone 12,5-50mg/j; indapamide 2,5mg/j. CI communes: hypokaliémie, hyponatrémie, anurie. Thiazidiques: CI hypercalcémie, allergie sulfamidés, goutte active, IR sévère. IM: AINS diminuent effet; risque détérioration rénale avec IECA/sartans; hypokaliémie augmente toxicité digitaliques; lithémie. Torasémide substrat CYP2C9. EI: hypokaliémie, hyponatrémie, hyperuricémie, hyperglycémie, troubles érection. Anse: ototoxicité."},
      {name:"Diurétiques épargneurs de potassium", icon:"⚖️", content:"Spironolactone/éplérénone: antagonistes aldostérone. Amiloride: bloque canaux Na+. Action diurétique limitée mais antihypertenseur marqué et survie IC. Préviennent hypokaliémie. Spironolactone HTA résistante 25-100mg/j; IC débuter 12,5mg max 50mg/j. Éplérénone IC: 25 max 50mg/j. IM: hyperkaliémie avec K+/diurétiques épargneurs/AINS/IECA/sartans/héparines. CI: hyperkaliémie, association suppléments K+, IR sévère; éplérénone: IH sévère; substrat CYP3A4. EI: hyperkaliémie; spironolactone: gynécomastie, aménorrhée, impuissance."},
      {name:"Bêta-bloquants", icon:"🫁", content:"Indications: HTA, angor, prévention secondaire IDM, arythmie ventriculaire, IC stable, FA. Cardiosélectifs (β1): acébutolol, aténolol, bisoprolol, céliprolol, esmolol, métoprolol, nébivolol. Non sélectifs: propranolol, pindolol. Effets α-bloquants aussi: labétalol, carvédilol. Posologies: bisoprolol HTA/angor 5-10mg/j; IC débuter 1,25 max 10mg/j. Métoprolol HTA 100-200mg/j; IC débuter 12,5 max 200mg/j. Propranolol HTA 80-240mg/j. IM: bradycardie/BAV avec vérapamil/diltiazem; masque hypoglycémie (moins cardiosélectifs); diminue β2-mimétiques asthme; carvédilol substrat CYP2C9+2D6; métoprolol/nébivolol/propranolol substrats CYP2D6; labétalol substrat CYP2C19. CI: BAV, IC aiguë, asthme (surtout non sélectifs), dépression sévère; carvédilol/nébivolol: IH. EI: extrémités froides, bronchospasmes, bradycardie, fatigue, dépression, insomnie."},
      {name:"Antagonistes calciques", icon:"🔬", content:"Dihydropyridines (amlodipine/nifédipine/lercanidipine): vasodilatation périphérique, HTA+angor. Vérapamil/diltiazem: effets cardiaques (chronotrope/inotrope négatifs), tachycardies supraventriculaires, FA, HTA. Posologies: amlodipine 5-10mg/j; nifédipine 30-60mg/j; vérapamil 120-480mg/j; diltiazem 180-360mg/j. IM: vérapamil+β-bloquants IV: CI absolue; DHP/vérapamil/diltiazem substrats CYP3A4; vérapamil+diltiazem inhibiteurs CYP3A4 et P-gp. CI: DHP: angor instable, IDM récent; vérapamil+diltiazem: BAV, maladie noeud sinusal, ivabradine, IC; lercanidipine: IR/IH sévère. EI: hyperplasie gingivale; vérapamil/diltiazem: constipation, bradycardie; DHP: céphalées, oedème chevilles, tachycardie réflexe."},
      {name:"SRAA – IECA & Sartans", icon:"🧬", content:"IECA: inhibent ECA, diminuent angiotensine II + augmentent bradykinine. Sartans: bloquent récepteurs AT1. Indications: HTA, IC, IDM, néphropathie diabétique. IECA: captopril 25-150mg/j; énalapril 5-20mg/j; lisinopril 10-40mg/j; ramipril 2,5-10mg/j. Sartans: candésartan 8-32mg/j; losartan 50-150mg/j; valsartan 80-320mg/j. IM: hyperkaliémie avec K+/diurétiques épargneurs/héparines/AINS; triple whammy IECA/sartan+AINS+diurétique: risque IR aiguë; candésartan/irbésartan/losartan/valsartan substrats CYP2C9. CI: grossesse, sténose bilatérale artères rénales, hyperkaliémie. EI: toux sèche (IECA: bradykinine/substance P); hyperkaliémie; hypotension 1ère dose; oedème angioneurotique."},
      {name:"Antiarythmiques", icon:"⚡", content:"Classification Vaughan Williams: Classe I (bloqueurs Na+): disopyramide/cibenzoline/propafénone/flécaïnide/lidocaïne. Classe II: bêta-bloquants. Classe III: amiodarone/sotalol/vernakalant. Classe IV: vérapamil/diltiazem. Amiodarone: substrat CYP3A4, inhibiteur CYP2C9/2D6/3A4/P-gp; augmente anticoagulants; CI grossesse (arrêter plusieurs mois avant)/allaitement/troubles thyroïdiens; EI: troubles GI, hépatotoxicité, hypo/hyperthyroïdie, photosensibilité, allongement QT. IM générales: torsades de pointes avec médicaments allongeant QT (amiodarone/cibenzoline/disopyramide/flécaïnide/sotalol/vernakalant). CI: IC, troubles conduction AV, risque allongement QT. EI: pro-arythmiques, allongement QT, inotrope négatif."},
      {name:"Hypolipidémiants", icon:"🧪", content:"Statines (simvastatine/pravastatine/fluvastatine/atorvastatine/rosuvastatine): inhibent HMG-CoA réductase, diminuent LDL. Posologies: atorvastatine 10-80mg/j; rosuvastatine 5-40mg/j; simvastatine 10-40mg/j. IM: toxicité musculaire avec inhibiteurs CYP3A4 (atorvastatine/simvastatine) ou CYP2C9 (fluvastatine) + fibrates; atorvastatine substrat CYP3A4+inhibiteur P-gp. CI: IH, transaminases >3x normale; rosuvastatine: IR sévère. EI: myalgies/myopathie/rhabdomyolyse, troubles GI, augmentation diabète type 2. Fibrates (ciprofibrate/fénofibrate): diminuent triglycérides surtout. CI: IH, lithiase biliaire, IR sévère. EI: myalgies (surtout avec statine). Ézétimibe: inhibe absorption cholestérol intestinal, 10mg/j. CI: IH. Résines (colestipol/colestyramine): fixent sels biliaires, nombreuses IM (prendre autres médicaments 1h avant ou 4h après). Inhibiteurs PCSK9 (alirocumab/évolocumab): injections SC/2 semaines, CI: hypersensibilité uniquement."}
    ]
  },

  ch6: {
    title: "Chapitre 6",
    subtitle: "Le système hormonal",
    icon: "⚗️",
    themes: [
      {name:"Diabète – Insulines", icon:"💉", content:"Diabète type 1: carence absolue insuline (destruction auto-immune cellules B). Diabète type 2: résistance insuline + altération sécrétion. Analogues ultrarapides (glulisine/aspart/lispro): effet 10min, durée 2-5h. Insulines rapides: effet 20-30min, durée 6-8h. Intermédiaires (isophane): début 1-2h, durée 10-20h, SC uniquement. Analogues longue durée (glargine/détémir/dégludec): SC uniquement; dégludec 1x/j >42h; glargine 1x/j >24h. IM toutes insulines: hypoglycémie+masque symptômes avec β-bloquants et alcool; risque IC avec pioglitazone; risque hypoglycémie avec IECA/sartans. Pas de CI (recommandé grossesse). EI: hypoglycémie, prise poids, lipodystrophie site injection, hypokaliémie (traitement acidocétose)."},
      {name:"Diabète – Metformine & sulfamidés", icon:"💊", content:"Metformine: 1er choix DT2. Diminue production hépatique glucose, augmente absorption glucose muscles, pas d'hypoglycémie seule, pas de prise poids. Posologie: 1-3g/j 2-3p pendant repas; adapter si IR. IM: acidose lactique avec alcool doses élevées/AINS/produits contraste iodés (arrêter 24h avant). CI: grossesse, facteurs risque acidose lactique (IR, IH, IC grave, déshydratation, alcool), IR/IH sévère. EI: troubles GI, acidose lactique rare. Sulfamidés (glibenclamide/gliclazide/glimépiride/glipizide/gliquidone): stimulent sécrétion insuline (blocage canaux K+-ATP). Option si metformine insuffisante. Substrats CYP2C9. IM: hypoglycémie avec β-bloquants/alcool/IECA/sartans/insulines/gliptines. CI: grossesse, allergie sulfamidés, combinaison glinides; glibenclamide/gliclazide/glimépiride/glipizide: IR/IH sévère. EI: hypoglycémie (surtout longue durée/PA/glibenclamide), prise poids."},
      {name:"Diabète – GLP-1, gliptines, gliflozines, acarbose", icon:"🔬", content:"Analogues GLP-1 (dulaglutide/liraglutide/sémaglutide/exénatide): augmentent sécrétion insuline glucose-dépendante, diminuent glucagon, ralentissent vidange gastrique, perte poids. Dulaglutide/liraglutide/sémaglutide: effet CV favorable. CI: grossesse. EI: troubles GI, hypoglycémie avec sulfamidés, pancréatite risque légèrement augmenté. Gliptines (sitagliptine/vildagliptine/saxagliptine/linagliptine/alogliptine): inhibiteurs DPP-4. Neutres sur poids. CI: grossesse. Gliflozines (canagliflozine/dapagliflozine/empagliflozine): inhibiteurs SGLT2 rénal, glucosurie, perte poids, rénoprotection + cardioprotection. CI: grossesse. EI: infections urinaires/génitales, acidocétose atypique. Glitazones (pioglitazone): agonistes PPAR-γ. CI: grossesse, IC ou ATCD, cancer vessie ou ATCD, IH. EI: prise poids, rétention hydrosodée, risque IC. Acarbose: inhibiteur α-glucosidases. CI: grossesse, maladies inflammatoires intestinales, IR/IH sévère. EI: troubles GI fréquents."},
      {name:"Thyroïde – Hyperthyroïdie", icon:"🦋", content:"Hyperthyroïdie (Graves-Basedow): tachycardie, perte poids, nervosité, tremblements. Traitement de base: thioamides. Thiamazol: 30-40mg/j 1-3 prises. Propylthiouracile (PTU): 300-600mg/j 3 prises. Mécanisme: inhibition iodation thyroglobuline (thyroperoxydase). PTU réduit aussi conversion T4→T3. IM: diminuent effet AVK. CI thiamazol: IH. EI: hypothyroïdie réversible, agranulocytose (surveiller 1er mois: contrôle NFS hebdomadaire; signaler immédiatement toute fièvre!), rash, perte cheveux. Iode: diminue temporairement sécrétion; solution de Lugol; iode radioactif: doses élevées hyperthyroïdie/cancer. Propranolol: contrôle symptômes hyperthyroïdie (bradycardisant, inhibe T4→T3)."},

      {name:"Hormones hypophysaires & médicaments divers", icon:"🧠", content:"Desmopressine: diabète insipide central, énurésie nocturne (7-8 ans), hémophilie A légère, nycturie. IM: rétention hydrique/hyponatrémie avec AINS/ISRS/carbamazépine. CI: IC, diurétiques, IR; voie nasale CI énurésie. EI: hyponatrémie (avec convulsions). Terlipressine: hémorragie varices oesophagiennes. CI: risque QT. Somatropine (GH): retard croissance enfant (déficit GH/IRC/Turner/Prader-Willi). CI: tumeurs malignes, transplantation rénale. EI: résistance insuline. Calcimimétiques (cinacalcet): hyperparathyroïdie secondaire dialyse. Cinacalcet inhibiteur CYP2D6. CI: hypocalcémie. EI: troubles GI, hypocalcémie. Calcitonine: maladie de Paget évolutive, hypercalcémie sévère. 100 UI/j SC. CI: hypocalcémie."}

};

const ALL_CHAPTERS = [
  ...BOOK.ch2.themes.map(t=>({...t, chapterTitle:"Chapitre 2"})),
  ...BOOK.ch3.themes.map(t=>({...t, chapterTitle:"Chapitre 3"})),
  ...BOOK.ch6.themes.map(t=>({...t, chapterTitle:'Chapitre 6'})),
  ...BOOK.ch9.themes,
  ...BOOK.ch11.themes
];

// Types de questions disponibles selon si le thème a des prescriptions ou non
const Q_TYPES = ["QCM","Question ouverte","Cas clinique"];

let currentPool = [];
let currentChapterKey = null;
let currentQIndex = 0;
let scores = [];
let questions = [];

// ──────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  window.scrollTo(0,0);
}

function openChapter(key){
  currentChapterKey = key;
  const ch = BOOK[key];
  document.getElementById("th-chapter-icon").textContent = ch.icon;
  document.getElementById("th-chapter-title").textContent = ch.title;
  document.getElementById("th-chapter-sub").textContent = ch.subtitle;
  const list = document.getElementById("theme-list");
  list.innerHTML = "";
  ch.themes.forEach(th=>{
    const div = document.createElement("div");
    div.className = "theme-row";
    div.innerHTML = `<div class="theme-row-icon">${th.icon}</div><div class="theme-row-name">${th.name}</div><div style="color:var(--muted);font-size:16px;">›</div>`;
    div.onclick = ()=>startQuiz([th]);
    list.appendChild(div);
  });
  showScreen("themes");
}

function examAllThemes(){ startQuiz(BOOK[currentChapterKey].themes); }
function startQuiz(pool){ currentPool=pool; currentQIndex=0; scores=[]; questions=[]; showScreen("quiz"); loadQuestion(); }
function retryQuiz(){ startQuiz(currentPool); }

// ──────────────────────────────────────────────
async function loadQuestion(){
  setLoading(true,"Génération de la question...");
  clearQuestion();

  const theme = currentPool[Math.floor(Math.random()*currentPool.length)];
  const types = theme.hasPrescription ? Q_TYPES : Q_TYPES;
  const qtype = types[Math.floor(Math.random()*types.length)];

  document.getElementById("q-num-label").textContent = `Question ${currentQIndex+1}`;
  document.getElementById("prog-fill").style.width = `${Math.min(5+currentQIndex*10,95)}%`;
  document.getElementById("q-chap-badge").textContent = theme.name;
  const tb = document.getElementById("q-type-badge");
  tb.textContent = qtype;
  tb.className = "badge "+(
    qtype==="QCM"?"badge-qcm":
    qtype==="Cas clinique"?"badge-case":
    qtype==="Prescription"?"badge-ordonnance":
    "badge-open"
  );

  let prompt = "";
  if(qtype==="QCM"){
    prompt=`Génère une QCM de pharmacologie sur le thème "${theme.name}".
Cours: ${theme.content}

Réponds UNIQUEMENT avec ce JSON, rien d'autre, pas de backticks:
{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":"A","explanation":"..."}

La valeur de "correct" doit être exactement "A", "B", "C" ou "D".`;
  } else if(qtype==="Question ouverte"){
    prompt=`Génère une question ouverte de pharmacologie sur le thème "${theme.name}".
Cours: ${theme.content}

Réponds UNIQUEMENT avec ce JSON, rien d'autre, pas de backticks:
{"question":"...","expectedPoints":["...","...","..."]}`;
  } else if(qtype==="Cas clinique"){
    prompt=`Génère un cas clinique de pharmacologie sur le thème "${theme.name}".
Cours: ${theme.content}

Réponds UNIQUEMENT avec ce JSON, rien d'autre, pas de backticks:
{"scenario":"...","question":"...","expectedPoints":["...","..."]}`;
  } else {
    // Prescription
    prompt=`Tu es formateur en pharmacologie. Génère une ordonnance fictive à analyser sur le thème "${theme.name}".
Cours: ${theme.content}

L'ordonnance doit avoir 2 à 4 médicaments et contenir soit une contre-indication, soit une interaction médicamenteuse dangereuse, soit une posologie incorrecte, soit être parfaitement correcte.
Indique un profil patient (age, sexe, antécédents brefs).
La decision doit être "délivrer" ou "refuser".

Réponds UNIQUEMENT avec ce JSON, rien d'autre, pas de backticks:
{"patient":"ex: Homme 65 ans, insuffisance rénale modérée","medicaments":[{"nom":"...","dose":"...","posologie":"..."},{"nom":"...","dose":"...","posologie":"..."}],"decision":"délivrer","explication":"..."}

Si l'ordonnance est problématique, decision="refuser". Sinon decision="délivrer".`;
  }

  try{
    const resp = await fetch("/api/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:[{role:"user",content:prompt}]})
    });
    if(!resp.ok) throw new Error("HTTP "+resp.status);
    const data = await resp.json();
    if(!data.content) throw new Error("Pas de contenu");
    const raw = data.content.map(b=>b.text||"").join("").trim();
    const start = raw.indexOf("{");
    const end = raw.lastIndexOf("}");
    if(start===-1||end===-1) throw new Error("JSON introuvable");
    const q = JSON.parse(raw.slice(start,end+1));
    if(qtype==="QCM"&&(!q.question||!Array.isArray(q.options)||!q.correct)) throw new Error("Structure invalide");
    if(qtype==="Prescription"&&(!q.medicaments||!q.decision)) throw new Error("Structure prescription invalide");
    q.type = qtype; q.theme = theme;
    questions.push(q);
    setLoading(false);
    renderQuestion(q);
  } catch(e){
    setLoading(false);
    document.getElementById("q-text").textContent = "La question n'a pas pu être générée.";
    document.getElementById("q-actions").innerHTML=`<button class="btn-primary" onclick="nextQuestion()">🔄 Nouvelle question</button>`;
  }
}

function clearQuestion(){
  document.getElementById("q-scenario").style.display="none";
  document.getElementById("q-text").textContent="";
  document.getElementById("q-options").innerHTML="";
  document.getElementById("q-ordonnance").style.display="none";
  document.getElementById("q-ordonnance").innerHTML="";
  document.getElementById("q-textarea").style.display="none";
  document.getElementById("q-textarea").disabled=false;
  document.getElementById("q-textarea").value="";
  document.getElementById("q-feedback").className="feedback";
  document.getElementById("q-feedback").innerHTML="";
  document.getElementById("q-actions").innerHTML="";
}

function renderQuestion(q){
  if(q.type==="Cas clinique"&&q.scenario){
    const sc=document.getElementById("q-scenario");
    sc.textContent=q.scenario; sc.style.display="block";
  }

  if(q.type==="Prescription"){
    // Pas de question text, on met l'instruction
    document.getElementById("q-text").textContent="Analysez cette ordonnance et décidez si vous la délivrez.";
    // Render ordonnance
    const box = document.getElementById("q-ordonnance");
    let medsHtml = q.medicaments.map((m,i)=>`
      <div class="ordonnance-med">
        <div class="med-num">${i+1}.</div>
        <div class="med-info">
          <div class="med-name">${m.nom} ${m.dose||""}</div>
          <div class="med-dose">${m.posologie||""}</div>
        </div>
      </div>`).join("");
    box.innerHTML=`
      <div class="ordonnance">
        <div class="ordonnance-header">📋 Ordonnance</div>
        <div class="ordonnance-patient">👤 ${q.patient||"Patient"}</div>
        ${medsHtml}
      </div>
      <div class="decision-btns">
        <button class="btn-deliver" id="btn-deliver" onclick="answerPrescription('délivrer', this)">✓ Délivrer</button>
        <button class="btn-refuse" id="btn-refuse" onclick="answerPrescription('refuser', this)">✗ Refuser</button>
      </div>`;
    box.style.display="block";
    return;
  }

  document.getElementById("q-text").textContent=q.question;

  if(q.type==="QCM"){
    const opts=document.getElementById("q-options");
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");
      btn.className="option-btn"; btn.textContent=opt;
      btn.onclick=()=>selectOption(btn,i,q);
      opts.appendChild(btn);
    });
  } else {
    document.getElementById("q-textarea").style.display="block";
    document.getElementById("q-actions").innerHTML=`<button class="btn-primary" onclick="submitOpen()">Corriger ma réponse →</button>`;
  }
}

function answerPrescription(answer, clickedBtn){
  // Désactiver les deux boutons
  document.getElementById("btn-deliver").disabled=true;
  document.getElementById("btn-refuse").disabled=true;
  const q = questions[questions.length-1];
  const correct = q.decision === answer;
  if(correct){
    scores.push(1);
    clickedBtn.style.opacity="1";
    showFeedback("good","✓ Correct ! "+q.explication);
  } else {
    scores.push(0);
    clickedBtn.style.opacity="0.4";
    // Mettre en évidence la bonne réponse
    const goodBtn = answer==="délivrer"
      ? document.getElementById("btn-refuse")
      : document.getElementById("btn-deliver");
    goodBtn.style.opacity="1";
    showFeedback("bad","✗ Il fallait "+(q.decision==="délivrer"?"délivrer":"refuser")+". "+q.explication);
  }
  showNextActions();
}

function selectOption(btn,idx,q){
  document.querySelectorAll(".option-btn").forEach(b=>b.disabled=true);
  const ci=["A","B","C","D"].indexOf(q.correct);
  if(idx===ci){btn.classList.add("correct");scores.push(1);showFeedback("good","✓ Correct ! "+q.explanation);}
  else{btn.classList.add("wrong");document.querySelectorAll(".option-btn")[ci].classList.add("correct");scores.push(0);showFeedback("bad","✗ Incorrect. Bonne réponse: "+q.options[ci]+". "+q.explanation);}
  showNextActions();
}

async function submitOpen(){
  const answer=document.getElementById("q-textarea").value.trim();
  if(!answer)return;
  document.getElementById("q-textarea").disabled=true;
  document.getElementById("q-actions").innerHTML="";
  setLoading(true,"Correction en cours...");
  const q=questions[questions.length-1];
  try{
    const resp=await fetch("/api/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:[{role:"user",content:`Évalue cette réponse de pharmacologie.
Question: ${q.question}
Points attendus: ${JSON.stringify(q.expectedPoints||[])}
Réponse: ${answer}
Réponds UNIQUEMENT en JSON sans backticks:
{"score":"bon","pointsManquants":[],"feedback":"..."}`}]})
    });
    const data=await resp.json();
    const raw=data.content.map(b=>b.text||"").join("").trim();
    const s=raw.indexOf("{"); const e=raw.lastIndexOf("}");
    const ev=JSON.parse(raw.slice(s,e+1));
    scores.push(ev.score==="bon"?1:ev.score==="partiel"?0.5:0);
    const icon=ev.score==="bon"?"✓":ev.score==="partiel"?"◑":"✗";
    const level=ev.score==="bon"?"good":ev.score==="partiel"?"partial":"bad";
    let fb=icon+" "+ev.feedback;
    if(ev.pointsManquants&&ev.pointsManquants.length)fb+="<br><br><strong>À revoir:</strong> "+ev.pointsManquants.join(", ");
    showFeedback(level,fb);
  }catch(e){scores.push(0.5);showFeedback("partial","Réponse enregistrée.");}
  setLoading(false);
  showNextActions();
}

function showFeedback(level,html){
  const fb=document.getElementById("q-feedback");
  fb.className="feedback show "+level;
  fb.innerHTML=html;
}

function showNextActions(){
  const canFinish=scores.length>=5;
  document.getElementById("q-actions").innerHTML=`
    <button class="btn-primary" onclick="nextQuestion()">Question suivante →</button>
    ${canFinish?`<button class='btn-ghost' onclick='showResults()'>Voir les résultats</button>`:""}
  `;
}

function nextQuestion(){ currentQIndex++; loadQuestion(); }

function setLoading(show,text=""){
  const el=document.getElementById("q-loading");
  el.className="loading"+(show?" show":"");
  if(text)document.getElementById("q-loading-text").textContent=text;
}

function showResults(){
  const total=scores.length,sum=scores.reduce((a,b)=>a+b,0),pct=Math.round((sum/total)*100);
  document.getElementById("res-pct").textContent=pct+"%";
  document.getElementById("res-title").textContent=pct>=80?"🎉 Excellent !":pct>=60?"👍 Bien joué !":"📚 Continue à réviser !";
  document.getElementById("res-sub").textContent=`${Math.round(sum*2)/2} / ${total} bonnes réponses`;
  document.getElementById("res-stats").innerHTML=`
    <p class="section-label" style="margin-bottom:1rem;">Résumé</p>
    <div class="stat-row"><span style="color:var(--muted);">Questions répondues</span><span style="font-weight:500;">${total}</span></div>
    <div class="stat-row"><span style="color:var(--muted);">Bonnes réponses</span><span style="font-weight:500;color:var(--green);">${Math.round(sum*2)/2}</span></div>
    <div class="stat-row"><span style="color:var(--muted);">Mauvaises réponses</span><span style="font-weight:500;color:var(--red);">${total-Math.round(sum*2)/2}</span></div>`;
  showScreen("results");
}
</script>
</body>
</html>
